<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact - TC-Infos-HDF</title>

    <link rel="icon" href="images/Logo-hdf.png">
    <link rel="apple-touch-icon" href="images/Logo-hdf.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        :root{
            --bg:#0b1220;
            --surface: #005cff;
            --primary: #ff4fff;
            --primary-hover:#2563eb;
            --text:#f4f7fb;
            --text-soft:#b6c2d9;
            --border:rgba(255,255,255,0.08);
            --shadow:0 10px 30px rgba(0,0,0,0.35);
        }

        /* RESET */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:
                    radial-gradient(circle at top left, rgba(59,130,246,0.15), transparent 30%),
                    radial-gradient(circle at bottom right, rgba(255,122,0,0.10), transparent 25%),
                    var(--bg);
            color:var(--text);
            min-height:100vh;
        }

        /* HEADER */

        header{
            position:sticky;
            top:0;
            z-index:999;
            backdrop-filter:blur(12px);
            background:rgba(11,18,32,0.75);
            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        header .logo img{
            height:70px;
        }

        header h1{
            font-size:28px;
            font-weight:800;
        }



        .nav{
            max-width:1400px;
            margin:auto;
            padding:18px 25px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:20px;
            flex-wrap:wrap;
        }


        nav{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            justify-content:center;
        }


        nav a{
            padding:10px 14px;
            border-radius:12px;
            font-weight:500;
            text-decoration:none;
            color:var(--text-soft);
            transition:.2s;
        }


        nav a:hover{
            background:rgba(255,255,255,0.08);
            color:white;
        }


        .btn-site{
            box-shadow:0 0 20px #0077ff;
        }


        .hero{
            width:min(1100px,92%);
            margin:40px auto;
            padding:50px 40px;
            border-radius:36px;
            background:linear-gradient(135deg, rgba(59,130,246,0.18), rgba(255,255,255,0.02));
            border:1px solid var(--border);
            box-shadow:var(--shadow);
        }

        .hero h2{
            font-size:48px;
            font-weight:800;
            margin-bottom:10px;
        }

        .hero p{
            color:var(--text-soft);
            font-size:18px;
        }

        #contact{
            width:min(600px,92%);
            margin:40px auto;
            padding:30px;
            border-radius:24px;
            background:rgba(255,255,255,0.04);
            border:1px solid var(--border);
            box-shadow:var(--shadow);
        }

        #contact h2{
            text-align:center;
            margin-bottom:20px;
            font-size:28px;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        input, textarea{
            padding:14px;
            border-radius:14px;
            border:1px solid var(--border);
            background:rgba(255,255,255,0.03);
            color:var(--text);
            font-size:16px;
            outline:none;
            transition:0.2s;
        }

        input:focus, textarea:focus{
            border-color:var(--primary);
            box-shadow:0 0 0 3px rgba(59,130,246,0.15);
        }

        textarea{
            min-height:140px;
            resize:vertical;
        }

        button{
            padding:14px;
            border:none;
            border-radius:16px;
            font-weight:700;
            font-size:16px;
            cursor:pointer;
            background:var(--primary);
            color:white;
            box-shadow:0 10px 25px rgba(59,130,246,0.3);
            transition:0.2s;
        }

        button:hover{
            background:var(--primary-hover);
            transform:translateY(-2px);
        }

        footer{
            margin-top:60px;
            padding:25px;
            text-align:center;
            color:var(--text-soft);
            border-top:1px solid var(--border);
        }

        footer a{
            color:#7db4ff;
            font-weight:600;
            text-decoration:none;
        }

        footer a:hover{
            color:white;
        }

        /* MOBILE */
        @media(max-width:700px){
            header{
                flex-direction:column;
                gap:10px;
            }

            .hero h2{
                font-size:34px;
            }
        }

        .menu-mobile{
            display:none;
            font-size:32px;
            cursor:pointer;
        }


        @media(max-width:700px){

            .nav{
                flex-wrap:nowrap;
            }

            .menu-mobile{
                display:block;
            }


            nav{
                position:absolute;
                top:80px;
                right:20px;

                background:#101c2e;
                border-radius:15px;
                padding:15px;

                display:none;
                flex-direction:column;
                width:220px;

                box-shadow:0 15px 40px rgba(0,0,0,.5);
            }


            nav.active{
                display:flex;
            }


            nav a{
                width:100%;
                text-align:center;
            }

        }



    </style>
</head>

<script>

    function toggleMenu(){

        document.getElementById("menu")
            .classList.toggle("active");

    }

</script>

<body>

<header>
        <div class="nav">

            <div class="logo">
                <img src="images/LogoNouvRect.png">
            </div>


            <div class="menu-mobile" onclick="toggleMenu()">
                ☰
            </div>


            <nav id="menu">

                <a href="index.html">Accueil</a>
                <a href="lesbus.html">Le parc</a>
                <a href="histoire.html">Histoire</a>
                <a href="ancienParc.html">Ancien parc</a>
                <a href="lignes.html">Lignes</a>
                <a href="galerie.html">Galerie</a>
                <a href="contact.html">Contact</a>

                <a class="btn-site"
                   href="https://stibus.fr"
                   target="_blank">
                    STIBUS
                </a>

            </nav>

        </div>

    </header>

<section class="hero">
    <h2>Contact</h2>
    <p>Une question ? Une suggestion ? Écrivez-nous directement.</p>
</section>

<section id="contact">
    <h2>Formulaire de contact</h2>

    <form action="https://formspree.io/f/mojndzdr" method="POST">
        <input type="text" name="nom" placeholder="Votre nom" required>
        <input type="email" name="email" placeholder="Votre email" required>
        <textarea name="message" placeholder="Votre message" required></textarea>
        <button type="submit">Envoyer</button>
        <div id="form-status"></div>
    </form>
</section>

<footer>
    &copy; 2026 TC-Infos-HDF | Conçu par MR et ML | Contact : <a href="mailto:tcinfoshdf@gmail.com">tcinfoshdf@gmail.com</a>  | Mis à jour le 16/06/2026 | Version 1.2
</footer>

</body>
</html>
