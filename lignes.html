<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page en maintenance</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="images/logo.png" type="image/png">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background-image: url("images/maintenance2.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
            font-family: Arial;
            text-align: center;
        }

        .box {
            max-width: 600px;
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 12px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        p {
            opacity: 0.8;
        }

        /* Container pour le texte + bouton sur la même ligne */
        .text-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; /* espace entre le texte et le bouton */
            margin-top: 20px;
        }

        /* Style du bouton */
        .btn {
            padding: 10px 20px;
            font-size: 1rem;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #0056b3;
        }

    </style>
</head>
<body>
<div class="box">
    <h1>🚧 Page en maintenance</h1>
    <p>Cette page, dédiée aux lignes du réseau STIBUS, est actuellement en développement.</p>
    <p>Du nouveau contenu sera bientôt disponible ! </p>

    <div class="text-button">
        <p>Retour au menu principal :</p>
        <a href="index.html" class="btn">Menu principal</a>
    </div>
</div>
</body>
</html>
