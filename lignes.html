<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page en maintenance</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="images/logo.png" type="image/png">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background-image: url("images/maintenance2.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
            font-family: Arial;
            text-align: center;
        }

        .box {
            max-width: 600px;
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 12px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        p {
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>🚧 Page en maintenance</h1>
    <p>Cette page, dédiée aux lignes du réseau STIBUS, est actuellement en développement.</p>
    <p>Du nouveau contenu sera bientôt disponible ! </p>
</div>
</body>
</html>
